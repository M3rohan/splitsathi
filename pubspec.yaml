name: splitsathi
description: "A new Flutter project."
publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^8.0.0

  # Navigation
  go_router: ^14.6.0

  # Firebase (Spark plan — free, no billing account)
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5
  firebase_remote_config: ^5.1.5
  firebase_crashlytics: ^4.1.5
  firebase_app_check: ^0.3.1

  # Localization
  easy_localization: ^3.0.7

  # Biometric & Secure Storage
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Charts (expense insights)
  fl_chart: ^0.69.0

  # UI / Animation
  animations: ^2.0.11
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  lottie: ^3.1.3

  # Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.0.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  uuid: ^4.5.1
  share_plus: ^10.1.2
  url_launcher: ^6.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/translations/
    - assets/images/
    - assets/animations/
